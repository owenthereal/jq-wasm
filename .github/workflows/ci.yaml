name: CI
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  tsc:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Compile typescript
        run: npm run tsc
  emscripten:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compile jq.js
        uses: docker/build-push-action@v6
        with:
          cache-from: |
            type=gha
          cache-to: |
            type=gha,mode=max
  # Runtime suite across the supported Node range (engines.node >=20; Node 18
  # is EOL and lacks an unflagged global `crypto`, which the wasm needs). A red
  # cell on the floor means engines is wrong and should be bumped.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24']
    name: test (node ${{ matrix.node }})
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm run test
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Run lint
        run: npm run lint
  # Cross-format/bundler smoke also runs across the supported Node range, since
  # module resolution and require/import behavior can differ between majors.
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24']
    name: smoke (node ${{ matrix.node }})
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Build dist (no Docker; uses committed wasm artifacts)
        run: npm run build:dist
      - name: Run cross-format smoke checks
        run: npm run smoke
  workers:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Run Cloudflare Workers runtime tests
        run: npm run test:workers
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Build dist (no Docker; uses committed wasm artifacts)
        run: npm run build:dist
      - name: Lint package exports/types (publint + are-the-types-wrong)
        run: npm run lint:package
